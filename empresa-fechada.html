<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Fechada - Delivery Problem Resolution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #e8ecf0; min-height: 100vh; color: #1a2332; }
        .header { background: #ffffff; border-bottom: 3px solid #131921; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-logo svg { width: 120px; height: 36px; }
        .btn-voltar { background: #131921; color: #ffffff; border: none; padding: 12px 24px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border-radius: 6px; transition: all 0.2s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-voltar:hover { background: #2d3a4a; color: #ffffff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .page-title { font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 48px; color: #131921; letter-spacing: -0.5px; }
        .section-label { display: inline-flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; color: #131921; margin-bottom: 40px; }
        .section-label svg { width: 28px; height: 28px; }
        .steps-container { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; }
        .step { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .step-phone-img { width: 240px; height: 480px; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.25); border: 3px solid #333; background: #1a1a2e; }
        .step-phone-img img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .step-phone-img.horizontal { width: 280px; height: 380px; border-radius: 18px; }
        .step-phone-img.horizontal img { object-fit: contain; object-position: center; background: #1a1a2e; }
        .step-label { font-size: 13px; font-weight: 700; color: #131921; text-align: center; text-transform: uppercase; max-width: 220px; line-height: 1.4; }
        .arrow { display: flex; align-items: center; justify-content: center; color: #131921; }
        .arrow svg { width: 40px; height: 40px; stroke: #131921; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        @media (max-width: 900px) { .header { padding: 12px 16px; } .header img { height: 32px !important; } .btn-voltar { padding: 10px 16px; font-size: 11px; } .container { padding: 24px 12px; } .page-title { font-size: 24px; margin-bottom: 32px; } .section-label { font-size: 18px; margin-bottom: 24px; } .steps-container { flex-direction: column; gap: 16px; } .arrow { transform: rotate(90deg); } .arrow svg { width: 30px; height: 30px; } .step-phone-img { width: 85vw; max-width: 300px; height: auto; aspect-ratio: 9/16; } .step-phone-img.horizontal { width: 85vw; max-width: 300px; height: auto; aspect-ratio: 4/3; } .step-label { font-size: 12px; } }
    </style>
</head>
<body>
    <header class="header">
        <img src="Logo_Amazon.jpg" alt="Amazon" style="height: 44px; object-fit: contain;">
        <a href="index.html" class="btn-voltar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Voltar ao Summary
        </a>
    </header>

    <div class="container">
        <h1 class="page-title">EMPRESA FECHADA</h1>

        <div class="section-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            ETAPAS
        </div>

        <div class="steps-container">
            <div class="step">
                <div class="step-phone-img">
                    <img src="step32.png" alt="Selecione Ajuda">
                </div>
                <div class="step-label">SELECIONE<br>AJUDA</div>
            </div>

            <div class="arrow">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>

            <div class="step">
                <div class="step-phone-img">
                    <img src="step33.png" alt="Não Foi Possível Entregar">
                </div>
                <div class="step-label">NÃO FOI POSSÍVEL<br>ENTREGAR</div>
            </div>

            <div class="arrow">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>

            <div class="step">
                <div class="step-phone-img horizontal">
                    <img src="step34.png" alt="Empresa Fechada">
                </div>
                <div class="step-label">EMPRESA FECHADA</div>
            </div>
        </div>
    </div>
</body>
</html>
